<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Community</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body>
    <div class="container">
        <!-- Профиль пользователя -->
        <section class="profile-section">
            <h1>Ваш профиль</h1>
            <div id="user-profile">
                <div class="profile-info">
                    <img id="user-photo" src="" alt="Фото профиля" class="profile-photo">
                    <div class="profile-details">
                        <p><strong>Имя:</strong> <span id="user-first-name"></span></p>
                        <p><strong>Username:</strong> @<span id="user-username"></span></p>
                        <p><strong>Реферальная ссылка:</strong></p>
                        <div class="referral-link">
                            <input type="text" id="referral-link" readonly>
                            <button onclick="copyReferralLink()">Копировать</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Форма добавления поста (только для админа) -->
        <section class="admin-section" id="admin-section" style="display: none;">
            <h2>Добавить новый пост</h2>
            <form id="post-form">
                <textarea id="post-content" placeholder="Введите текст поста..." required></textarea>
                <button type="submit">Опубликовать для всех</button>
            </form>
        </section>

        <!-- Лента постов -->
        <section class="posts-section">
            <h2>Последние посты</h2>
            <div id="posts-container">
                <div class="loading">Загрузка постов...</div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
